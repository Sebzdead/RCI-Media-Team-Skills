<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Red paper background</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--rci-offwhite); }
  .wrap { padding: 18px 22px; }
  .panel {
    border: 2px solid var(--rci-ink);
    height: 220px;
    background: url(../assets/backgrounds/red-paper.jpg) center/cover;
    position: relative;
    display: flex; align-items: center; justify-content: center;
  }
  h1 {
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 88px;
    line-height: 0.92;
    text-transform: uppercase;
    color: var(--rci-offwhite);
    margin: 0;
    text-align: center;
    text-shadow: 6px 6px 0 var(--rci-ink);
  }
  .lbl {
    position: absolute; left: 0; bottom: 0;
    padding: 3px 6px;
    background: var(--rci-ink);
    color: var(--rci-offwhite);
    font-family: var(--font-condensed);
    font-size: 9px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="panel">
    <h1>LESS<br>IS MORE</h1>
    <span class="lbl">Red paper · 1080×1920</span>
  </div>
</div>
</body>
</html>
