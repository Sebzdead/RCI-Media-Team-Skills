<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Spacing scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--rci-offwhite); }
  .wrap { padding: 18px 26px; }
  .row { display: flex; align-items: center; gap: 14px; padding: 4px 0; }
  .bar { background: var(--rci-red); height: 16px; }
  .tag { font-family: var(--font-mono); font-size: 11px; color: var(--rci-ash); width: 70px; }
  .name { font-family: var(--font-condensed); font-weight: 700; text-transform: uppercase; font-size: 12px; letter-spacing: 0.12em; width: 64px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="row"><span class="name">S1</span><div class="bar" style="width:4px"></div><span class="tag">4 px</span></div>
  <div class="row"><span class="name">S2</span><div class="bar" style="width:8px"></div><span class="tag">8 px</span></div>
  <div class="row"><span class="name">S3</span><div class="bar" style="width:12px"></div><span class="tag">12 px</span></div>
  <div class="row"><span class="name">S4</span><div class="bar" style="width:16px"></div><span class="tag">16 px</span></div>
  <div class="row"><span class="name">S5</span><div class="bar" style="width:24px"></div><span class="tag">24 px</span></div>
  <div class="row"><span class="name">S6</span><div class="bar" style="width:32px"></div><span class="tag">32 px</span></div>
  <div class="row"><span class="name">S7</span><div class="bar" style="width:48px"></div><span class="tag">48 px</span></div>
  <div class="row"><span class="name">S8</span><div class="bar" style="width:64px"></div><span class="tag">64 px</span></div>
</div>
</body>
</html>
