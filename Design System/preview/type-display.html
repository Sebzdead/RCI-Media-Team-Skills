<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Display type</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--rci-offwhite); }
  .wrap { padding: 18px 26px 22px; }
  .specimen { font-family: var(--font-display); text-transform: uppercase; line-height: 0.88; color: var(--rci-ink); }
  .l1 { font-size: 96px; }
  .l1 em { font-style: normal; color: var(--rci-red); }
  .meta { display: flex; gap: 18px; align-items: baseline; margin-top: 8px; }
  .meta .name { font-family: var(--font-condensed); font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; }
  .meta .sub  { font-family: var(--font-condensed); color: var(--rci-ash); font-size: 12px; text-transform: uppercase; letter-spacing: 0.12em; }
</style>
</head>
<body>
<div class="wrap">
  <div class="specimen">
    <div class="l1">LESS <em>IS</em> MORE</div>
  </div>
  <div class="meta">
    <div class="name">Built Titling · Bold</div>
    <div class="sub">Display — the brand's primary face</div>
  </div>
</div>
</body>
</html>
