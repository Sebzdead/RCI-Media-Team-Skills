<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Type families</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--rci-offwhite); }
  .wrap { padding: 14px 22px; display: grid; grid-template-columns: 120px 1fr; gap: 6px 18px; align-items: baseline; }
  .label { font-family: var(--font-condensed); font-size: 10px; text-transform: uppercase; letter-spacing: 0.14em; color: var(--rci-red); font-weight: 700; }
  .sample { color: var(--rci-ink); line-height: 1.05; }
  .a { font-family: var(--font-display); font-size: 30px; text-transform: uppercase; }
  .b { font-family: var(--font-headline); font-weight: 800; font-size: 24px; text-transform: uppercase; }
  .c { font-family: var(--font-condensed); font-weight: 700; font-size: 22px; text-transform: uppercase; }
  .d { font-family: var(--font-compressed); font-weight: 700; font-size: 22px; text-transform: uppercase; }
  .e { font-family: var(--font-accent); font-weight: 800; font-size: 24px; text-transform: uppercase; }
  .f { font-family: var(--font-subhead); font-weight: 600; font-size: 20px; }
  .g { font-family: var(--font-body); font-size: 18px; }
  .h { font-family: var(--font-serif); font-size: 19px; font-style: italic; }
</style>
</head>
<body>
<div class="wrap">
  <div class="label">Display</div><div class="sample a">Built Titling · Bold</div>
  <div class="label">Headline</div><div class="sample b">Trade Gothic Next · Heavy</div>
  <div class="label">Condensed</div><div class="sample c">Trade Gothic Cn · Bold</div>
  <div class="label">Compressed</div><div class="sample d">Trade Gothic · Compressed</div>
  <div class="label">Accent</div><div class="sample e">Revolution Gothic · XB</div>
  <div class="label">Subhead</div><div class="sample f">Khand — politically loaded</div>
  <div class="label">Body / UI</div><div class="sample g">Codec Warm — synthetic, concise.</div>
  <div class="label">Serif</div><div class="sample h">Cheltenham BT — "Better fewer, but better."</div>
</div>
</body>
</html>
