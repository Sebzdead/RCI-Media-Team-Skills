<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Serif — Cheltenham BT</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--rci-offwhite); }
  .wrap { padding: 18px 26px; max-width: none; }
  .specimen {
    font-family: var(--font-serif);
    color: var(--rci-ink);
    font-size: 56px;
    line-height: 1;
    margin: 0;
  }
  .specimen .red { color: var(--rci-red); }
  .body {
    margin-top: 16px;
    font-family: var(--font-serif);
    font-style: italic;
    font-size: 16px;
    line-height: 1.45;
    color: var(--rci-ink-soft);
    max-width: 560px;
  }
  .meta {
    margin-top: 10px;
    font-family: var(--font-condensed);
    font-weight: 700;
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--rci-ash);
  }
</style>
</head>
<body>
<div class="wrap">
  <p class="specimen">El <span class="red">Estado</span><br>y la Revolución.</p>
  <p class="body">Cheltenham BT — editorial serif used for long-form body copy, pull-quotes, and book references. Regular, Italic, Bold, and Bold Italic in <code>/fonts</code>.</p>
  <div class="meta">Cheltenham BT · Regular &amp; Italic</div>
</div>
</body>
</html>
